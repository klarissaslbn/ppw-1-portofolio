<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; font-family: sans-serif; }
  nav {
    position: sticky;
    top: 0;
    background: #6c63ff;
    color: white;
    padding: 12px 20px;
    font-weight: bold;
    z-index: 10;
  }
  section {
    padding: 20px;
    border-bottom: 1px solid #ddd;
    min-height: 120px;
  }
  h2 { color: #333; }
</style>
</head>
<body>
  <section>
    <h2>Sebelum Nav</h2>
    <p>Scroll ke bawah untuk melihat nav menempel!</p>
  </section>
  <nav>📌 Navbar Sticky — saya tetap di atas!</nav>
  <section><h2>Konten 1</h2><p>Lorem ipsum dolor sit amet...</p></section>
  <section><h2>Konten 2</h2><p>Consectetur adipiscing elit...</p></section>
  <section><h2>Konten 3</h2><p>Sed do eiusmod tempor...</p></section>
</body>
</html>
