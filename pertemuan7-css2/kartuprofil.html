<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Profile</title>
</head>
<style>
    body { font-family: sans-serif; }
    .container {
        width: 280px;
        height: 350px;
        position: relative;
        background: #ffeeee;
        margin: 20px auto;
        border-radius: 20px;
        box-shadow: 2px 0 10px grey;
        display: flex;
        flex-direction: column;
        justify-content: center; 
        align-items: center;     
        }

    .box {
        width: 100px;
        height: 20px; 
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        color: white;
        border-radius: 6px;
        position: absolute;
    }

    .badgestatus {
        background: #ffeeee;
        top: 0; right: 0;
        padding: 10px 10px;
        z-index: 2;
        color:maroon;
    }

    .nav {
    position: sticky;
    top: 0;
    background: rgb(158, 85, 85);
    color: white;
    padding: 12px 20px;
    font-weight: bold;
    z-index: 10;
    }

        .nav ul {
    display: flex;
    gap: 30px;
    list-style: none;
    margin: 0;
    padding: 0;
    }

    .nav a {
    color: white;
    text-decoration: none;
    }

    .backtotop {
    position: fixed;
    bottom: 25px;
    right: 40px;
    background: rgb(158, 85, 85);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    }

    .profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: block;
    margin: 40px auto 10px;
    }

    .container h2 {
    text-align: center;
    margin: 5px 0;
    }

    .desc {
    text-align: center;
    font-size: 14px;
    color: #555;
    font-weight: bold;
    }

    .btn {
    display: block;
    margin: 20px auto;
    padding: 8px 16px;
    border: none;
    background: rgb(158, 85, 85);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    }

    .btn:hover {
    background: #f8b5b5;
    }

    .backtotop:hover {
        background: #f8b5b5;
    }


</style>
<body>

    <nav class="nav">
        <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="box badgestatus">Online 🟢</div>
        <img src="https://i.pravatar.cc/150" class="profile-img">

    <h2>Rissa</h2>
    <p class="desc">Frontend Developer</p>

    <button class="btn">Follow</button>
    </div>

   <button class="backtotop">Back to Top</button>
</body>
</html>
