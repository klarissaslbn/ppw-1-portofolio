<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran HIMA HIMA AN</title>
</head>
<body>

    <img src="Emblem_of_Universitas_Gadjah_Mada.svg (1).png" alt="Logo UGM" width="100" align="left"><br>
    <h2>Form Pendaftaran HIMAHIMAAN</h2><br><br><br>

    <form>
        <fieldset>
            <legend>Data Diri</legend>

            <label for="nama">Nama Lengkap:</label><br>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda"><br><br>
            
            <label for="nim">NIM:</label><br>
            <input type="text" id="nim" name="nim" placeholder="Masukkan NIM Anda"><br><br>

            <label for="tgl_lahir">Tanggal Lahir:</label><br>
            <input type="date" id="tgl_lahir" name="tgl_lahir"><br><br>

            <label>Foto Profil Anda:</label><br>
            <img src="IMG_2555.JPG" alt="Contoh Foto" width="50"><br>
            <input type="file" name="foto"><br><br>

            <label for="pilihkelas">Kelas:</label>
            <input type="text" id="pilihkelas" name="kelas" list="pilkelas">

            <datalist id="pilkelas">
                <option value="A1">
                <option value="A2">
                <option value="B1">
                <option value="B2">
            </datalist>

        </fieldset>

        <br>

        <fieldset>
            <legend>Pemilihan Divisi</legend>

            <label for="divisi">Divisi Pilihan 1:</label>
            <select id="divisi" name="divisi">
                <option value="medinfo">Medinfo</option>
                <option value="psdm">PSDM</option>
                <option value="minkat">Minkat</option>
                <option value="humas">Humas</option>
                <option value="benda">Bendahara</option>
                <option value="sekre">Sekretaris</option>
            </select>

            <br>

            <textarea name="message" rows="15" cols="45">
            Alasan Memilih Divisi ini adalah:
            </textarea>

            <br>

            <label for="divisi">Divisi Pilihan 2:</label>
            <select id="divisi" name="divisi">
                <option value="medinfo">Medinfo</option>
                <option value="psdm">PSDM</option>
                <option value="minkat">Minkat</option>
                <option value="humas">Humas</option>
                <option value="benda">Bendahara</option>
                <option value="sekre">Sekretaris</option>
            </select>

            <br>

            <textarea name="message" rows="15" cols="45">
            Alasan Memilih Divisi ini adalah:
            </textarea>

        </fieldset>

        <br>

        <button type="submit" style="padding: 10px 30px; font-size: 15px; cursor: pointer;">Kirim</button>
    </form>
</body>
</html>
