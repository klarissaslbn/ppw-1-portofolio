<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langkah Praktikum 4</title>
    <style>
        p.mix {border-style: dotted dashed solid double;border-color:brown}
    </style>
</head>
<body>
    <p style="border: 3px solid brown;">border solid</p>
    <p style="border: 3px dashed brown;">border dashed</p>
    <p style="border: 3px dotted brown;">border dotted</p>
    <p style="border: 3px double brown;">border double</p>
    <p style="border: 3px groove brown;">border groove</p>
    <p style="border: 3px ridge brown;">border ridge</p>
    <p style="border: 3px inset brown;">border inset</p>
    <p style="border: 3px outset brown;">border outset</p>
    <p style="border: none;">border gaada</p>
    <p style="border: 3px hidden">border tersembunyi</p>
    <p class="mix">border campuran</p>
</body>
</html>
