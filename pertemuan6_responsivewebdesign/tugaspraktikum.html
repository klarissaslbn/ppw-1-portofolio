<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        nav {
            background: #333;
            padding: 10px 20px;
        }

        nav ul {
            display: flex;
            list-style: none;
            justify-content: space-between;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 20px;
        }

        .hero img {
            width: 100%;
            max-width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .hero h1 {
            margin-top: 15px;
            font-size: 2rem;
        }

        /* CONTENT (CARDS) */
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #ffeeee;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

       
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            .card {
                width: 90%;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }

            .hero h1 {
                font-size: 1.2rem;
            }
        }

    </style>
</head>
<body>

    <nav>
        <ul>
           <li><a href="responsive.html">Home</a></li>
           <li><a href="about2.html">About</a></li>
           <li><a href="contact2.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <img src="https://picsum.photos/800/400" alt="Hero Image">
        <h1>Welcome to my site</h1>
    </section>

    <section class="container">
        <div class="card">
            <h3>Card 1</h3>
            <p>Contoh card responsive.</p>
        </div>
        <div class="card">
            <h3>Card 2</h3>
            <p>Layout menggunakan Flexbox.</p>
        </div>
        <div class="card">
            <h3>Card 3</h3>
            <p>Menyesuaikan ukuran layar.</p>
        </div>
    </section>

</body>
</html>
