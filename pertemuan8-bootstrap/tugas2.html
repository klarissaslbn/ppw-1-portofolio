<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tugas 2</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="#">ADMISSION UGM</a>
    </div>
  </nav>


  <!-- ISI -->
  <div class="container my-4">

    <div id="alertSukses" class="alert alert-success alert-dismissible fade show d-none">
      Data berhasil disimpan!
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">Formulir Pendaftaran Mahasiswa Baru</h5>
      </div>
      <div class="card-body">

        <form id="formDaftar">

          <!-- BAGIAN: DATA DIRI -->
          <h6 class="text-muted mb-3">Data Diri</h6>

          <div class="row mb-3">

            <!-- Nama Lengkap -->
            <div class="col-12 col-md-6 mb-3 mb-md-0">
              <label for="nama" class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" id="nama" placeholder="Masukkan nama lengkap" />
              <div class="invalid-feedback">Nama tidak boleh kosong.</div>
              <div class="valid-feedback">Nama belum digunakan.</div>
            </div>

            <!-- NIM -->
            <div class="col-12 col-md-6">
              <label for="nim" class="form-label">NIM</label>
              <input type="text" class="form-control" id="nim" placeholder="Contoh: 25/SV/UHUY  " />
              <div class="invalid-feedback">NIM tidak boleh kosong.</div>
              <div class="valid-feedback">NIM belum digunakan.</div>
            </div>

          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="abcdefghi@email.com" />
          </div>

          <!-- ======= AKADEMIK  -->
          <hr />
          <h6 class="text-muted mb-3">Informasi Akademik</h6>

          <!--Program Studi -->
          <div class="mb-3">
            <label for="prodi" class="form-label">Program Studi</label>
            <select class="form-select" id="prodi">
              <option value="">Pilih Program Studi</option>
              <option>TRPL</option>
              <option>TRE</option>
              <option>TRIK</option>
              <option>TRI</option>
            </select>
          </div>

          <!-- Semester -->
          <div class="mb-3">
            <label for="semester" class="form-label">Semester</label>
            <select class="form-select" id="semester">
              <option value=""> Pilih Semester</option>
              <option>Semester 1</option>
              <option>Semester 3</option>
              <option>Semester 5</option>
              <option>Semester 7</option>
            </select>
          </div>

          <!-- Alamat -->
          <div class="mb-3">
            <label for="alamat" class="form-label">Alamat</label>
            <textarea class="form-control" id="alamat" rows="3" placeholder="Masukkan alamat lengkap"></textarea>
          </div>

          <!-- Foto Profil -->
          <div class="mb-4">
            <label for="foto" class="form-label">Foto Profil</label>
            <input type="file" class="form-control" id="foto" accept="image/*" />
          </div>

          <div class="d-flex gap-2">
            <button type="button" class="btn btn-success" id="btnSimpan">Simpan</button>
            <button type="button" class="btn btn-secondary" id="btnReset">Reset</button>
          </div>

        </form>

      </div>
    </div>

  </div>


  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-3 mt-4">
    <p class="mb-0">&copy; 2026 UGM. Hak Cipta Dilindungi.</p>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById('btnSimpan').addEventListener('click', function () {

      var nama = document.getElementById('nama');
      var nim  = document.getElementById('nim');
      var oke  = true;

      nama.classList.remove('is-valid', 'is-invalid'); 
      if (nama.value === '') {
        nama.classList.add('is-invalid'); 
        oke = false;
      } else {
        nama.classList.add('is-valid');   
      }
      nim.classList.remove('is-valid', 'is-invalid');
      if (nim.value === '') {
        nim.classList.add('is-invalid');
        oke = false;
      } else {
        nim.classList.add('is-valid');
      }
      if (oke) {
        document.getElementById('alertSukses').classList.remove('d-none');
        window.scrollTo(0, 0); 
      }
    });

    document.getElementById('btnReset').addEventListener('click', function () {
      document.getElementById('formDaftar').reset();
      document.getElementById('nama').classList.remove('is-valid', 'is-invalid');
      document.getElementById('nim').classList.remove('is-valid', 'is-invalid');

    });
  </script>

</body>
</html>
