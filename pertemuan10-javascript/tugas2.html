<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Praktikan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container py-4">

<h2>Form Pendataan Praktikan</h2>

<button class="btn btn-primary" onclick="cekMahasiswa()">
Isi Data
</button>

<div id="hasil" class="mt-4"></div>

<script>

function cekMahasiswa() {

    // confirm()
    let status = confirm("Apakah Anda mahasiswa PPW1?");

    // jika YA
    if(status) {

        // prompt()
        let nama = prompt("Masukkan Nama:");
        let nim = prompt("Masukkan NIM:");
        let angkatan = parseInt(prompt("Masukkan Angkatan:"));

        // hitung tahun lulus
        let tahunLulus = angkatan + 4;

        // cek genap / ganjil
        let cekNIM = (nim % 2 == 0) ? "Genap" : "Ganjil";

        // tampilkan data
        document.getElementById("hasil").innerHTML = `
        
        <table class="table table-bordered">
            <tr>
                <th>Nama</th>
                <td>${nama}</td>
            </tr>

            <tr>
                <th>NIM</th>
                <td>${nim}</td>
            </tr>

            <tr>
                <th>Angkatan</th>
                <td>${angkatan}</td>
            </tr>

            <tr>
                <th>Tahun Lulus</th>
                <td>${tahunLulus}</td>
            </tr>

            <tr>
                <th>Status NIM</th>
                <td>${cekNIM}</td>
            </tr>
        </table>
        
        `;

    }

    // jika TIDAK
    else {

        document.getElementById("hasil").innerHTML = `
        
        <div class="alert alert-danger">
            Maaf... hanya mahasiswa PPW1 yang boleh masuk 😎
        </div>
        
        `;
    }
}

</script>

</body>
</html>
